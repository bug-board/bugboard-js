# Publishes the package to npm when a release is published on GitHub.
#
# Releasing is manual: bump package.json and the CHANGELOG, merge to main, then
# draft a release on github.com with a new v* tag and publish it.
#
# Auth is npm trusted publishing (OIDC) — there is no NPM_TOKEN and no secret to
# rotate. npm mints a short-lived credential scoped to this workflow, which is
# why the `id-token: write` permission below is load-bearing.
#
# One-time setup on npmjs.com/package/bugboard/access → Trusted Publisher:
#   organisation: bug-board   repository: bugboard-js   workflow: release.yml
# Renaming this file breaks publishing until that field is updated to match.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required to mint the OIDC token npm authenticates with

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Node 22 bundles npm 10, which predates OIDC support. Trusted publishing
      # needs npm >= 11.5.1, so upgrade before publishing.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test

      - name: Check tag matches package.json version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - run: npm publish --provenance --access public
